<script>
        async function conectarRobo() {
            try {
                const resposta = await fetch('dados.json');
                const dados = await resposta.json();
                
                if (dados) {
                    // 1. Processa dados do Executivo
                    if (dados.executivo) {
                        const gavetaPrefeito = document.getElementById('gaveta-prefeito');
                        if (gavetaPrefeito && dados.executivo.diario_oficial) {
                            gavetaPrefeito.innerHTML = `<a href="${dados.executivo.diario_oficial}" target="_blank" class="text-green-400 hover:underline font-bold animate-pulse">[VER DIÁRIO]</a>`;
                        }
                        
                        // Gaveta para o futuro site oficial
                        const gavetaSiteExec = document.getElementById('gaveta-site-executivo');
                        if (gavetaSiteExec && dados.executivo.site_oficial) {
                            gavetaSiteExec.innerHTML = `<a href="${dados.executivo.site_oficial}" target="_blank" class="text-blue-400 hover:underline">[ACESSAR SITE]</a>`;
                        } else if (gavetaSiteExec) {
                            gavetaSiteExec.innerText = "[AGUARDANDO]";
                        }
                    }
                    
                    // 2. Processa dados do Legislativo
                    if (dados.legislativo) {
                        const gavetaCamara = document.getElementById('gaveta-portal-camara');
                        if (gavetaCamara && dados.legislativo.portal_camara) {
                            gavetaCamara.innerHTML = `<a href="${dados.legislativo.portal_camara}" target="_blank" class="text-yellow-400 hover:underline font-bold">[PORTAL ATIVO]</a>`;
                        } else if (gavetaCamara) {
                            gavetaCamara.innerText = "[AGUARDANDO]";
                        }
                    }
                    
                    document.getElementById('status-led').className = "w-3 h-3 bg-green-400 rounded-full animate-none";
                    document.getElementById('status-text').innerText = "STATUS: VERITAS_ONLINE_MATRIZ";
                }
            } catch (erro) {
                console.error("Erro na leitura da matriz de dados:", erro);
                document.getElementById('status-led').className = "w-3 h-3 bg-red-500 rounded-full animate-pulse";
                document.getElementById('status-text').innerText = "STATUS: ERRO_MATRIZ_DADOS";
            }
        }
        window.onload = conectarRobo;
    </script>
